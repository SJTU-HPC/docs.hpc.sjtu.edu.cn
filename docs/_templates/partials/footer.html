{# 继承原有 footer #}
{% extends "!partials/footer.html" %}

{% block goatcounterfooter %}

{# GoatCounter 统计脚本 #}
<script data-goatcounter="https://docshpc.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

{# 显示总访客数 #}
<div class="gc-visitor-count">
  <span>总访问人数：</span>
  <span id="gc-total-count">加载中...</span>
</div>

<script>
  // GoatCounter 公开 API，获取全站总计
  fetch("https://docshpc.goatcounter.com/counter/TOTAL.json")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var el = document.getElementById("gc-total-count");
      if (el && data.count) {
        el.textContent = data.count;
      }
    })
    .catch(function() {
      var el = document.getElementById("gc-total-count");
      if (el) el.textContent = "暂不可用";
    });
</script>
{% endblock %}
